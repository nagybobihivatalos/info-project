<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10.-es projekt munkák</title>

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#050505;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:100vh;
    overflow:hidden;
}

/* ===== HEADER ===== */
header{
    text-align:center;
    padding:70px 20px 40px;
}

header h1{
    font-size:3rem;
    font-weight:900;
    background:linear-gradient(to bottom,#fff,#444);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

header p{
    color:#aaa;
    margin-top:10px;
}

/* ===== MAIN ===== */
main{
    flex-grow:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.button-container{
    display:flex;
    flex-direction:column;
    gap:25px;
}

/* ===== ASTRO BUTTON (ZÖLD VERZIÓ) ===== */
.nav-button{
    position:relative;
    text-decoration:none;
    padding:18px 40px;
    font-size:1.2rem;
    font-weight:700;
    color:#fff;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.4s ease;
    overflow:hidden;
}

/* Animated gradient border - GREEN/TURQUOISE */
.nav-button::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:18px;
    background:linear-gradient(120deg,#00f5a0,#00d9f5,#00f5a0);
    background-size:300% 300%;
    animation:gradientMove 6s linear infinite;
    z-index:-1;
    opacity:0;
    transition:0.4s;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.nav-button:hover{
    transform:scale(1.08);
    box-shadow:0 0 30px rgba(0,245,160,0.5);
}

.nav-button:hover::before{
    opacity:1;
}

.nav-button:active{
    transform:scale(0.95);
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:25px;
    color:#777;
    font-size:0.9rem;
    border-top:1px solid rgba(255,255,255,0.05);
}

/* ===== RESPONSIVE ===== */
@media(min-width:600px){
    .button-container{
        flex-direction:row;
    }

    .nav-button{
        width:220px;
        text-align:center;
        font-size:1.3rem;
    }
}

</style>
</head>
<body>

<header>
    <h1>10. év</h1>
    <p>Válasszd ki az alábbi gombok egyikét, hogy továbblépjél!</p>
</header>

<main>
    <div class="button-container">
        <a href="elsofelev.html" class="nav-button">1. félév</a>
        <a href="masodikfelev.html" class="nav-button">2. félév</a>
        <a href="osztaly.html" class="nav-button">Vissza</a>
    </div>
</main>

<footer>
    <p>&copy; 2025 Info Projekt | Minden jog fenntartva.</p>
</footer>

</body>
</html>
