<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projektek | Ultra Dark</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#050505;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* ===== CURSOR GLOW ===== */
#cursor-glow{
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(59,130,246,0.15),transparent 70%);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:0;
}

/* ===== BLUR WHEN LOCKED ===== */
.locked main,
.locked header{
  filter:blur(8px);
  pointer-events:none;
  user-select:none;
}

/* ===== ORIGINAL PAGE ===== */
header{
  position:relative;
  z-index:1;
  text-align:center;
  margin:80px 0 60px;
}

header h1{
  font-size:4rem;
  font-weight:900;
  background:linear-gradient(to bottom,#fff 0%,#444 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

main{
  position:relative;
  z-index:1;
  max-width:700px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:25px;
  padding:20px;
}

.section{
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(10px);
  padding:40px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s;
}

.section:hover{
  border-color:rgba(59,130,246,0.5);
}

.section h2{
  color:#3b82f6;
  margin-bottom:10px;
}

.btn{
  display:inline-block;
  margin-top:25px;
  background:#fff;
  color:#000;
  padding:15px 35px;
  font-weight:800;
  border-radius:12px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#3b82f6;
  color:#fff;
  box-shadow:0 0 30px rgba(59,130,246,0.4);
}

/* ===== MODERN ASTRO LOGIN OVERLAY ===== */

#loginOverlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(20px);
  z-index:1000;
  transition:0.6s ease;
}

/* animated gradient border */
.login-box{
  position:relative;
  padding:50px;
  width:380px;
  border-radius:25px;
  background:rgba(20,20,20,0.9);
  backdrop-filter:blur(30px);
  text-align:center;
  overflow:hidden;
}

.login-box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:25px;
  background:linear-gradient(120deg,#3b82f6,#8b5cf6,#3b82f6);
  background-size:300% 300%;
  animation:gradientMove 6s linear infinite;
  z-index:-1;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.login-box h2{
  margin-bottom:30px;
  font-size:1.6rem;
  letter-spacing:1px;
}

.login-box input{
  width:100%;
  padding:14px;
  margin-bottom:18px;
  background:#111;
  border:1px solid #333;
  border-radius:12px;
  color:#fff;
  transition:0.3s;
}

.login-box input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 15px rgba(59,130,246,0.5);
  outline:none;
}

.login-box button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:800;
  background:linear-gradient(90deg,#3b82f6,#8b5cf6);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

.login-box button:hover{
  transform:scale(1.03);
  box-shadow:0 0 30px rgba(139,92,246,0.6);
}

.error{
  margin-top:10px;
  color:#ff4d4d;
  font-size:0.9rem;
}

/* fade out */
#loginOverlay.hidden{
  opacity:0;
  pointer-events:none;
}

</style>
</head>
<body class="locked">

<div id="cursor-glow"></div>

<header>
  <h1>PROJEKTEK</h1>
</header>

<main>
  <section class="section">
    <h2>Rólunk</h2>
    <p>Elkötelezett fejlesztők, modern technológiák.</p>
  </section>

  <section class="section">
    <h2>Munkáink</h2>
    <p>Nézd meg a legfrissebb fejlesztéseinket.</p>
    <a href="osztaly.html" class="btn">OSZTÁLY MUNKÁK</a>
  </section>
</main>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>Admin Access</h2>
    <input type="text" id="username" placeholder="Felhasználónév">
    <input type="password" id="password" placeholder="Jelszó">
    <button onclick="login()">Belépés</button>
    <div class="error" id="errorMsg"></div>
  </div>
</div>

<script>
const glow=document.getElementById('cursor-glow');
document.addEventListener('mousemove',(e)=>{
  glow.style.left=e.clientX+'px';
  glow.style.top=e.clientY+'px';
});

function login(){
  const user=document.getElementById('username').value;
  const pass=document.getElementById('password').value;
  const error=document.getElementById('errorMsg');

  if(user==="admin" && pass==="admin"){
    document.getElementById('loginOverlay').classList.add('hidden');
    document.body.classList.remove('locked');
  }else{
    error.textContent="Hibás belépési adatok!";
  }
}
</script>

</body>
</html>
