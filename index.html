<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projektek | Ultra Dark</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background-color: #050505;
  color: #ffffff;
  min-height: 100vh;
  overflow: hidden;
}

/* ===== MAIN CONTENT (hidden initially) ===== */
#mainContent {
  display: none;
  min-height: 100vh;
  padding: 40px;
}

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  position: fixed;
  inset: 0;
  background: #050505;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

/* Glow background */
#loginScreen::before {
  content: "";
  position: absolute;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(59,130,246,0.2), transparent 70%);
  filter: blur(120px);
  animation: float 6s ease-in-out infinite alternate;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(40px); }
}

.login-box {
  position: relative;
  background: rgba(20,20,20,0.8);
  backdrop-filter: blur(20px);
  padding: 50px;
  border-radius: 20px;
  width: 350px;
  border: 1px solid rgba(59,130,246,0.4);
  box-shadow: 0 0 50px rgba(59,130,246,0.3);
  text-align: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.login-box h2 {
  margin-bottom: 25px;
  color: #3b82f6;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  background: #111;
  border: 1px solid #333;
  border-radius: 10px;
  color: #fff;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.login-box button:hover {
  box-shadow: 0 0 25px rgba(59,130,246,0.6);
}

.error {
  color: red;
  margin-top: 10px;
  font-size: 0.9rem;
}

/* ===== MAIN PAGE STYLE ===== */
header {
  text-align: center;
  margin-bottom: 60px;
}

header h1 {
  font-size: 4rem;
  font-weight: 900;
  background: linear-gradient(to bottom, #fff 0%, #444 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.section {
  max-width: 700px;
  margin: auto;
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 25px;
}

.section h2 {
  color: #3b82f6;
  margin-bottom: 10px;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Admin Bejelentkezés</h2>
    <input type="text" id="username" placeholder="Felhasználónév">
    <input type="password" id="password" placeholder="Jelszó">
    <button onclick="login()">Belépés</button>
    <div class="error" id="errorMsg"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <header>
    <h1>PROJEKTEK</h1>
  </header>

  <div class="section">
    <h2>Rólunk</h2>
    <p>Elkötelezett fejlesztők, modern technológiák.</p>
  </div>

  <div class="section">
    <h2>Munkáink</h2>
    <p>Nézd meg az osztály projektjeinket.</p>
  </div>
</div>

<script>
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  const error = document.getElementById('errorMsg');

  if(user === "admin" && pass === "admin") {
    document.getElementById('loginScreen').style.display = "none";
    document.getElementById('mainContent').style.display = "block";
    document.body.style.overflow = "auto";
  } else {
    error.textContent = "Hibás felhasználónév vagy jelszó!";
  }
}
</script>

</body>
</html>
