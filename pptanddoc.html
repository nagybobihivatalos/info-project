<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPT & DOC</title>

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    background: radial-gradient(circle at 20% 30%, #0a0f1f, #04060b 60%);
    color: #e6f1ff;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
}

/* ===== Animated Background Glow ===== */
body::before {
    content: "";
    position: fixed;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(123, 0, 255, 0.25), transparent 70%);
    top: -200px;
    right: -200px;
    filter: blur(120px);
    animation: float 8s ease-in-out infinite alternate;
    z-index: 0;
}

@keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(40px); }
}

/* ===== Mouse Glow ===== */
.mouse-glow {
    position: fixed;
    width: 500px;
    height: 500px;
    pointer-events: none;
    background: radial-gradient(circle, rgba(0,255,255,0.12) 0%, transparent 60%);
    transform: translate(-50%, -50%);
    z-index: 0;
    filter: blur(60px);
}

/* ===== Custom Cursor ===== */
.cursor {
    width: 18px;
    height: 18px;
    border: 2px solid #8a2cff;
    border-radius: 50%;
    position: fixed;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 0 20px #8a2cff;
}

/* ===== Container ===== */
.container {
    position: relative;
    z-index: 2;
    max-width: 1000px;
    margin: auto;
    padding: 80px 40px;
}

/* ===== Back Button ===== */
.back-btn {
    display: inline-block;
    margin-bottom: 50px;
    padding: 10px 20px;
    border-radius: 40px;
    text-decoration: none;
    font-weight: 500;
    color: #8a2cff;
    border: 1px solid rgba(138, 44, 255, 0.4);
    backdrop-filter: blur(10px);
    transition: 0.3s ease;
}

.back-btn:hover {
    background: #8a2cff;
    color: #04060b;
    box-shadow: 0 0 25px #8a2cff;
}

/* ===== Title ===== */
h1 {
    font-size: 52px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #00f2fe, #8a2cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #7e94b8;
    margin-bottom: 70px;
}

/* ===== Cards ===== */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 50px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 40px;
    backdrop-filter: blur(25px);
    box-shadow: 
        0 0 40px rgba(0, 255, 255, 0.05),
        0 0 80px rgba(138, 44, 255, 0.05);
    transition: 0.4s ease;
    position: relative;
    overflow: hidden;
}

/* Neon border glow */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(120deg, #00f2fe, #8a2cff, #00f2fe);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity: 0;
    transition: 0.4s ease;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-15px) scale(1.02);
}

.card h2 {
    margin-bottom: 15px;
    font-size: 22px;
}

.card p {
    font-size: 14px;
    color: #9fb3d6;
    margin-bottom: 30px;
}

/* ===== Download Button ===== */
.download-btn {
    display: inline-block;
    padding: 12px 26px;
    border-radius: 40px;
    text-decoration: none;
    font-weight: 600;
    background: linear-gradient(90deg, #00f2fe, #8a2cff);
    color: #04060b;
    transition: 0.3s ease;
    box-shadow: 0 0 20px rgba(138, 44, 255, 0.4);
}

.download-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(138, 44, 255, 0.7);
}

/* ===== Footer ===== */
.footer {
    margin-top: 90px;
    font-size: 13px;
    color: #5c6f8f;
    text-align: center;
}

</style>
</head>

<body>

<div class="mouse-glow"></div>
<div class="cursor"></div>

<div class="container">

    <a href="osztaly.html" class="back-btn">⬅ Vissza</a>

    <h1>PPT & DOC</h1>
    <p class="subtitle">
        Projekt fájlok letöltése modern astro glass felületen.
    </p>

    <div class="cards">

        <div class="card">
            <h2>Dokumentum</h2>
            <p>Teljes projekt dokumentáció PDF formátumban.</p>
            <a href="dokumentum.pdf" download class="download-btn">
                Letöltés PDF
            </a>
        </div>

        <div class="card">
            <h2>Prezentáció</h2>
            <p>Prezentáció PowerPoint (.pptx) formátumban.</p>
            <a href="prezentacio.pptx" download class="download-btn">
                Letöltés PPTX
            </a>
        </div>

    </div>

    <div class="footer">
        © 2026 • BobiInfoProject
    </div>

</div>

<script>
const glow = document.querySelector(".mouse-glow");
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
