<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kábel Típus Kalkulátor</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    backdrop-filter: blur(15px);
    background: rgba(128,128,128,0.08);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:600px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    text-align:center;
}

h1{
    margin-bottom:25px;
}

select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background: rgba(128,128,128,0.15);
    color:white;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    margin:10px 5px;
    background: rgba(255,255,255,0.15);
    color:white;
    backdrop-filter: blur(10px);
    transition:0.3s;
}

button:hover{
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background: rgba(0,0,0,0.4);
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔌 Kábel Típus Kalkulátor</h1>

    <select id="device1">
        <option value="">Válassz első eszközt</option>
        <option value="pc">PC</option>
        <option value="switch">Switch</option>
        <option value="hub">Hub</option>
        <option value="router">Router</option>
    </select>

    <select id="device2">
        <option value="">Válassz második eszközt</option>
        <option value="pc">PC</option>
        <option value="switch">Switch</option>
        <option value="hub">Hub</option>
        <option value="router">Router</option>
    </select>

    <button onclick="calculateCable()">Kábel Meghatározása</button>

    <div class="result" id="result"></div>

    <button onclick="downloadCode()">Kód letöltése</button>
    <button onclick="history.back()">Vissza</button>

</div>

<script>
function calculateCable(){
    const d1 = document.getElementById("device1").value;
    const d2 = document.getElementById("device2").value;

    if(!d1 || !d2){
        document.getElementById("result").innerHTML="❌ Válassz ki két eszközt!";
        return;
    }

    // Azonos típus → fordított
    if(d1 === d2){
        document.getElementById("result").innerHTML="🔁 Fordított (crossover) kábel szükséges.";
        return;
    }

    // PC ↔ Switch/Hub → egyenes
    if(
        (d1==="pc" && (d2==="switch"||d2==="hub")) ||
        (d2==="pc" && (d1==="switch"||d1==="hub"))
      ){
        document.getElementById("result").innerHTML="🔀 Egyenes (straight-through) kábel szükséges.";
        return;
    }

    // Router ↔ Switch/Hub → egyenes
    if(
        (d1==="router" && (d2==="switch"||d2==="hub")) ||
        (d2==="router" && (d1==="switch"||d1==="hub"))
      ){
        document.getElementById("result").innerHTML="🔀 Egyenes (straight-through) kábel szükséges.";
        return;
    }

    // PC ↔ Router → fordított
    if(
        (d1==="pc" && d2==="router") ||
        (d2==="pc" && d1==="router")
      ){
        document.getElementById("result").innerHTML="🔁 Fordított (crossover) kábel szükséges.";
        return;
    }

    // Switch ↔ Hub → fordított
    if(
        (d1==="switch" && d2==="hub") ||
        (d2==="switch" && d1==="hub")
      ){
        document.getElementById("result").innerHTML="🔁 Fordított (crossover) kábel szükséges.";
        return;
    }
}

function downloadCode(){
    const element = document.createElement('a');
    element.setAttribute('href','data:text/html;charset=utf-8,' + encodeURIComponent(document.documentElement.outerHTML));
    element.setAttribute('download','kabel_kalkulator.html');
    element.style.display='none';
    document.body.appendChild(element);
    element.click();
    document.body.removeChild(element);
}
</script>

</body>
</html>
