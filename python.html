<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hálózati Cím Kalkulátor</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#141e30,#243b55);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:40px;
    width:90%;
    max-width:600px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    outline:none;
    background: rgba(255,255,255,0.15);
    color:white;
    font-size:16px;
}

input::placeholder{
    color:#ddd;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    margin:5px 5px 5px 0;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.15);
    color:white;
    transition:0.3s;
}

button:hover{
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background: rgba(0,0,0,0.3);
}

.footer-buttons{
    margin-top:20px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌐 Hálózati Cím Kalkulátor</h1>

    <input type="text" id="ip" placeholder="IP cím (pl. 192.168.1.10)">
    <input type="number" id="prefix" placeholder="Prefix (pl. 24)" min="0" max="32">

    <button onclick="calculate()">Számítás</button>

    <div class="result" id="result"></div>

    <div class="footer-buttons">
        <button onclick="downloadCode()">Kód letöltése</button>
        <button onclick="history.back()">Vissza</button>
    </div>
</div>

<script>
function ipToInt(ip){
    return ip.split('.').reduce((acc,oct)=>(acc<<8)+parseInt(oct),0)>>>0;
}

function intToIp(int){
    return [(int>>>24)&255,(int>>>16)&255,(int>>>8)&255,int&255].join('.');
}

function calculate(){
    const ip = document.getElementById("ip").value;
    const prefix = parseInt(document.getElementById("prefix").value);

    if(!ip || isNaN(prefix) || prefix<0 || prefix>32){
        document.getElementById("result").innerHTML="❌ Hibás adat!";
        return;
    }

    const ipInt = ipToInt(ip);
    const mask = prefix===0?0: (0xFFFFFFFF << (32-prefix))>>>0;
    const network = ipInt & mask;
    const broadcast = network | (~mask>>>0);
    const firstHost = prefix===32?network:network+1;
    const lastHost = prefix===32?network:broadcast-1;
    const hosts = prefix>=31?0:(Math.pow(2,32-prefix)-2);

    document.getElementById("result").innerHTML = `
        <b>Hálózati cím:</b> ${intToIp(network)} <br>
        <b>Broadcast cím:</b> ${intToIp(broadcast)} <br>
        <b>Első host:</b> ${intToIp(firstHost)} <br>
        <b>Utolsó host:</b> ${intToIp(lastHost)} <br>
        <b>Hostok száma:</b> ${hosts}
    `;
}

function downloadCode(){
    const element = document.createElement('a');
    element.setAttribute('href','data:text/html;charset=utf-8,' + encodeURIComponent(document.documentElement.outerHTML));
    element.setAttribute('download','halozati_kalkulator.html');
    element.style.display='none';
    document.body.appendChild(element);
    element.click();
    document.body.removeChild(element);
}
</script>

</body>
</html>
